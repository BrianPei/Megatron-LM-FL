ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  GPUS_PER_NODE: 1
TEST_TYPE: frozen-start
MODE: rl
BEFORE_SCRIPT: |
  bash tests/functional_tests/test_cases/gpt/_selfcontained/prepare_tiny_null_gpt_checkpoint.sh \
    "${CHECKPOINT_LOAD_PATH}" \
    6702
MODEL_ARGS:
  --use-mcore-models: true
  --tokenizer-type: NullTokenizer
  --vocab-size: 4095
  --load: ${CHECKPOINT_LOAD_PATH}
  --mock-data: true
  --micro-batch-size: 1
  --global-batch-size: 4
  --seq-length: 32
  --max-position-embeddings: 64
  --inference-max-seq-length: 64
  --inference-dynamic-batching-buffer-size-gb: 0.008
  --inference-dynamic-batching-max-tokens: 64
  --inference-dynamic-batching-cuda-graph-max-tokens: 64
  --distributed-backend: nccl
  --log-interval: 1
  --log-progress: true
  --transformer-impl: local
  --tensor-model-parallel-size: 1
  --pipeline-model-parallel-size: 1
  --ckpt-format: torch
  --bf16: true
  --deterministic-mode: true
  --no-gradient-accumulation-fusion: true
  --no-load-optim: true
  --num-layers: 2
  --hidden-size: 64
  --num-attention-heads: 4
  --tensorboard-dir: ${TENSORBOARD_PATH}
  --log-memory-to-tensorboard: true
  --log-num-zeros-in-grad: true
  --log-validation-ppl-to-tensorboard: true
  --log-timers-to-tensorboard: true
  --langrl-inference-server-type: inplace_megatron
  --seed: 42
  --calculate-per-token-loss: true
  --grpo-group-size: 2
  --grpo-prompts-per-step: 2
  --grpo-iterations: 1
  --grpo-clamp-eps-lower: 0.2
  --grpo-clamp-eps-upper: 0.2
  --grpo-kl-beta: 0.0
  --grpo-entropy-term-weight: 0.0
  --langrl-env-config: tests/functional_tests/test_cases/gpt/gpt_grpo_tp1_pp1_tiny_null_selfcontained/env_config.yaml
  --lr: 1.0e-6
  --lr-warmup-samples: 0
  --clip-grad: 1.0
  --perform-rl-step: true
  --train-samples: 100000
  --exit-interval: 4
  --save-interval: 1000000
  --eval-interval: 1000000
  --finetune: true
METRICS:
  - "iteration-time"
