ENV_VARS:
  CUDA_DEVICE_MAX_CONNECTIONS: 1
  NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0
  NCCL_ALGO: Ring
  CUBLAS_WORKSPACE_CONFIG: :4096:8
  GPUS_PER_NODE: 1
TEST_TYPE: frozen-start
MODE: inference
BEFORE_SCRIPT: |
  cat > "${OUTPUT_PATH}/tiny_null_prompts.jsonl" <<'EOF'
  {"text": "1 2 3 4"}
  {"text": "5 6 7 8"}
  EOF
  bash tests/functional_tests/test_cases/gpt/_selfcontained/prepare_tiny_null_gpt_checkpoint.sh \
    "${CHECKPOINT_LOAD_PATH}" \
    6701
MODEL_ARGS:
  --use-mcore-models: true
  --tokenizer-type: NullTokenizer
  --vocab-size: 4095
  --load: ${CHECKPOINT_LOAD_PATH}
  --micro-batch-size: 1
  --inference-max-seq-length: 32
  --incoming-requests-per-step: 1
  --distributed-backend: nccl
  --transformer-impl: local
  --tensor-model-parallel-size: 1
  --pipeline-model-parallel-size: 1
  --deterministic-mode: true
  --ckpt-format: torch
  --bf16: true
  --no-load-optim: true
  --num-layers: 2
  --hidden-size: 64
  --num-attention-heads: 4
  --max-position-embeddings: 64
  --seq-length: 32
  --temperature: 1.0
  --top_k: 1
  --return-log-probs: true
  --num-tokens-to-generate: 4
  --prompt-file: ${OUTPUT_PATH}/tiny_null_prompts.jsonl
  --output-path: ${TENSORBOARD_PATH}
METRICS:
  - "generated_tokens"
  - "logprobs"
