# Ascend Hardware Configuration for Megatron-LM-FL
# This file defines CI/CD settings for Ascend-based testing.
# Validated on: Ascend 910C (A3), 8 CI-visible devices, CANN 9.0.0, torch 2.7.1

hardware_name: ascend
display_name: 'Ascend Tests'
setup_script: .github/scripts/set_env_ascend.sh
nproc_per_node: 8

# CI image for the Ascend environment (built and pushed 2026-07-17, validated on Ascend 910C)
ci_image: harbor.baai.ac.cn/flagos-dev/megatron-lm-fl:manual-20260717-ascend-dev

# Runner labels for the Ascend node
runner_labels:
  - hw-8g-cicd-megatron

# Container volumes (hardware-specific paths)
# NOTE: /usr/local/Ascend/add-ons does not exist on this runner; not mounted.
# NOTE: datasets/tokenizers not mounted for unit tests (add when functional tests needed).
container_volumes:
  - /usr/local/Ascend/driver:/usr/local/Ascend/driver
  - /usr/local/sbin/npu-smi:/usr/local/sbin/npu-smi

# Container options (hardware-specific settings)
container_options: >-
  --privileged
  --shm-size=500g
  --hostname megatron_cicd
  --user root
  --ipc=host
  --pid=host
  --ulimit nofile=65535:65535
  --env ASCEND_RT_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
  --device=/dev/davinci0
  --device=/dev/davinci1
  --device=/dev/davinci2
  --device=/dev/davinci3
  --device=/dev/davinci4
  --device=/dev/davinci5
  --device=/dev/davinci6
  --device=/dev/davinci7
  --device=/dev/davinci_manager
  --device=/dev/devmm_svm
  --device=/dev/hisi_hdc

# Device types to run tests on
device_types:
  - 910c

# Test matrix configuration
test_matrix:
  unit:
    devices:
      - 910c
    pytest_extra_args: []
    groups:
      - name: models
        path: tests/unit_tests/models/
        description: Model tests
      - name: distributed
        path: tests/unit_tests/distributed/
        description: Distributed tests
    # Ignored test files/cases for unit tests.
    # These are skipped when running pytest on Ascend NPU.
    ignored_tests:
      ## 1. core — FP8
      # Ascend 910C does not support FP8; all scaling/quantization tests fail
      # at the TE-FL operator layer.
      - tests/unit_tests/test_fp8_param.py

      ## 2. core — SGD optimizer (CPU offloading)
      # TE-FL reference implementation of multi_tensor_sgd has wrong argument
      # signature on NPU: takes 8 positional arguments but 11 are given.
      # Only 'sgd' parameter combinations fail; 'adam' combinations pass and
      # are kept enabled for coverage.
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0-True-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0.5-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0.5-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0.5-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-0.5-True-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-1.0-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-1.0-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-1.0-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[False-sgd-1.0-True-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0-True-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0.5-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0.5-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0.5-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-0.5-True-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-1.0-False-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-1.0-False-10]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-1.0-True-1]
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_multi_device_hybrid_optimizer[True-sgd-1.0-True-10]
      # All overlap correctness cases use sgd only; ignore the whole function.
      - tests/unit_tests/test_optimizer_cpu_offloading.py::test_overlap_cpu_optimizer_d2h_h2d_sync_correctness

      ## 3. core — precision-aware optimizer
      # Requires CUDA/TE-specific features not available on NPU.
      # metax also ignores this case.
      - tests/unit_tests/test_optimizer.py::test_precision_aware_fused_adam

      ## 4. core — NCCL allocator (collection error)
      # torch._C._nccl_version does not exist on NPU (uses HCCL, not NCCL).
      # Collection fails at class definition level; no runtime workaround.
      - tests/unit_tests/test_nccl_allocator.py

      ## 5. core — straggler detector and param norm
      # test_straggler_detector: HCCL teardown crash during pytest session
      # cleanup. Same environment issue seen on metax/cuda; metax also ignores.
      - tests/unit_tests/test_utils.py::test_straggler_detector
      # test_param_norm_*: RuntimeError in distributed param norm computation
      # on NPU. Not reproduced on metax or cuda. Under investigation.
      - tests/unit_tests/test_utils.py::test_param_norm_linear[False]
      - tests/unit_tests/test_utils.py::test_param_norm_linear[True]
      - tests/unit_tests/test_utils.py::test_param_norm_moe[False]
      - tests/unit_tests/test_utils.py::test_param_norm_moe[True]

      # NOTE: test_training_log_grpo_and_auxiliary_writer_paths is NOT ignored.
      # Upstream PR #82 will remove that test; the failure is transient.

      ## 6. core — platform register (non-idempotent registry_patch)
      # platform_npu.py registry_patch is not idempotent; calling
      # register_platforms() a second time raises RuntimeError.
      # Remove after fixing platform_npu.py.
      - megatron/plugin/tests/test_platform.py::TestPlatformRegister::test_all_registered_platforms_are_available
      - megatron/plugin/tests/test_platform.py::TestPlatformRegister::test_register_platforms_adds_cpu
      - megatron/plugin/tests/test_platform.py::TestPlatformRegister::test_registered_cpu_is_platform_base_instance
      - megatron/plugin/tests/test_platform.py::TestPlatformRegister::test_registered_platforms_keys_are_lowercase
      - megatron/plugin/tests/test_platform.py::TestPlatformRegister::test_unavailable_platform_not_registered
     
      ## 7. core — platform contract (monitoring methods return None)
      # platform_npu.py monitoring API returns None instead of int/float/bool.
      # Remove after fixing platform_npu.py.
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_clock_rate_returns_numeric
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_get_compile_backend_returns_string
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_is_triton_supported_returns_bool
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_power_draw_returns_numeric
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_temperature_returns_numeric
      - megatron/plugin/tests/test_platform.py::TestAllRegisteredPlatformsContract::test_utilization_returns_numeric

      ## 8. core — single-rank checkpoint fixture incompatible with multi-GPU
      # test_save_checkpoint[torch] uses initialize_model_parallel(1,1)
      # (single-rank), incompatible with torchrun --nproc_per_node=8.
      - tests/unit_tests/test_checkpointing.py::test_save_checkpoint[torch]

      ## 9. tensor_parallel — TransformerEngine RNG tracker
      # TransformerEngine-FL still reads torch.cuda.default_generators for an
      # NPU device, whose CUDA generator tuple is empty in the CPU torch build.
      # Remove after TE-FL uses torch.npu.default_generators for Ascend.
      - tests/unit_tests/tensor_parallel/test_random.py::test_convert_cuda_rng_state

      ## 10. distributed — HCCL/HCCS errors on Ascend
      # 0% pass rate: all tests error/fail at HCCL setup.
      # test_distributed_data_parallel.py port conflict — may be resolved by HCCL_NPU_SOCKET_PORT_RANGE
      # - tests/unit_tests/distributed/test_distributed_data_parallel.py
      - tests/unit_tests/distributed/megatron_fsdp/test_mcore_fully_sharded_data_parallel.py
      - tests/unit_tests/distributed/megatron_fsdp/test_mfsdp_fully_shard.py::TestMegatronFsdpFullyShard::test_fully_shard_custom_dtype
      - tests/unit_tests/distributed/megatron_fsdp/test_mfsdp_fully_shard.py::TestMegatronFsdpFullyShard::test_fully_shard_ez
      - tests/unit_tests/distributed/megatron_fsdp/test_mfsdp_fully_shard.py::TestMegatronFsdpFullyShard::test_fully_shard_te_quantized
      # HCCL error code 7 / port conflict — may be resolved by HCCL_NPU_SOCKET_PORT_RANGE
      # - tests/unit_tests/distributed/test_grad_reduce_for_replicated_embedder.py
      # - tests/unit_tests/distributed/test_grad_sync_with_expert_parallel.py
      # - tests/unit_tests/distributed/test_param_and_grad_buffer.py
      # - tests/unit_tests/distributed/test_reduce_scatter_with_fp32_accumulation.py
      # - tests/unit_tests/distributed/megatron_fsdp/test_mfsdp_fully_shard.py::TestMegatronFsdpFullyShard::test_dcp_checkpoint_save_and_load
      # - tests/unit_tests/distributed/test_finalize_model_grads.py
      # - tests/unit_tests/distributed/test_torch_fully_sharded_parallel.py::test_fsdp2_constructor

      ## 11. models — need CUDA / HCCL init errors / TE missing backend
      # MambaSSM not installed (CUDA dependency)
      - tests/unit_tests/models/test_mamba_model.py
      - tests/unit_tests/models/test_mamba_moe_model.py
      - tests/unit_tests/models/test_heterogeneous_gpt_model.py
      # HCCL error code 7 — may be resolved by HCCL_NPU_SOCKET_PORT_RANGE
      # - tests/unit_tests/models/test_mimo_1f1b_schedule.py::TestMimo1F1BSchedule::test_encoder_tp2_llm_tp2_pp3_8gpu
      # - tests/unit_tests/models/test_mimo_1f1b_schedule.py::TestMimo1F1BSchedule::test_full_pp_8gpu
      # - tests/unit_tests/models/test_mimo_1f1b_schedule.py::TestMimo1F1BSchedule::test_fan_in_dp4_to_dp1_llm_tp2_pp2_8gpu
      # - tests/unit_tests/models/test_mimo_1f1b_schedule.py::TestMimo1F1BSchedule::test_fan_out_dp1_to_dp4_enc_tp2_pp2_8gpu
      # - tests/unit_tests/models/test_mimo_1f1b_schedule.py::TestMimo1F1BSchedule::test_fan_in_dp2_to_dp1_llm_pp3_8gpu
      # - tests/unit_tests/models/test_mimo_checkpoint.py
      # Hardcoded CUDA device check
      - tests/unit_tests/models/test_base_embedding.py::TestBaseEmbedding::test_gpu_forward
      # HCCL port conflict
      - tests/unit_tests/models/test_base_embedding.py::TestBaseEmbedding::test_constructor
      # Needs CUDA/TE-specific features; metax also ignores
      - tests/unit_tests/models/test_gpt_model.py::TestGPTModelWithCustomPG::test_gpt_model_with_custom_pg
      # TE-FL misses get_fused_attn_backend
      - tests/unit_tests/models/test_llava_model.py::TestLLaVAModel::test_forward
      - tests/unit_tests/models/test_llava_model.py::TestLLaVAModel::test_forward_fsdp
      - tests/unit_tests/models/test_llava_model.py::TestLLaVAModelTokenParallel::test_process_embedding_token_parallel

  functional:
    train:
      # Golden values for Ascend 910C not yet recorded.
      # Populate once a validated training run is complete:
      # - model: gpt
      #   test_case: qwen3_0p6b_mcore_te_tp1_pp1_no_mmap_bin_files_npu
